<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witchlight Survivor</title>
    <link rel="stylesheet" href="../../src/styles/base.css">
    <link rel="stylesheet" href="../../src/styles/game-shell.css">
    <link rel="stylesheet" href="../../src/styles/mobile-controls.css">
    <style>
        .game-page .header {
            font-size: 1.2rem;
            align-items: center;
            color: #f7e8c6;
            text-shadow: 0 0 12px rgba(168, 85, 247, 0.8);
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .stat-highlight {
            color: #f6d56e;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.85);
        }

        #xp-bar-container {
            width: 800px;
            height: 24px;
            background-color: #1e1430;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 1px solid rgba(246, 213, 110, 0.7);
            padding: 7px 14px;
            box-shadow: 0 0 18px rgba(88, 28, 135, 0.45);
        }

        #xp-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6d28d9, #d8b4fe, #f6d56e);
            border-radius: 999px;
            box-shadow: 0 0 10px #d8b4fe;
            transition: width 0.2s;
        }

        .game-page canvas {
            background-color: #120d1d;
            image-rendering: auto;
        }

        /* Witch & Warlock UI skin. PNGs are optional; base colors remain as fallback. */
        .game-page .screen-overlay {
            background-color: rgba(18, 13, 29, 0.96);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%;
            padding: 2rem 4rem;
            z-index: 10;
            color: #f7e8c6;
        }

        .game-page #overlay-screen {
            background-image: linear-gradient(180deg, rgba(64, 32, 18, 0.95), rgba(31, 18, 48, 0.96));
            border: 2px solid #f43f5e;
            box-shadow: 0 0 28px rgba(244, 63, 94, 0.42);
            min-width: min(430px, 90vw);
        }

        .game-page #pause-screen {
            background-image: linear-gradient(180deg, rgba(64, 32, 18, 0.95), rgba(31, 18, 48, 0.96));
            border: 2px solid #f6d56e;
            box-shadow: 0 0 28px rgba(246, 213, 110, 0.34);
            width: min(360px, 90vw);
        }

        #level-up-screen {
            background-image: linear-gradient(180deg, rgba(64, 32, 18, 0.96), rgba(31, 18, 48, 0.98));
            border: 2px solid #a855f7;
            box-shadow: 0 0 28px rgba(168, 85, 247, 0.45);
            width: min(470px, 92vw);
        }

        h2 { margin: 0 0 1rem 0; font-size: 2.5rem; }
        .survived-time { font-size: 1.2rem; color: #e9d5ff; margin-bottom: 1.5rem; }

        .game-page button {
            padding: 12px 24px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .game-page .arcade-control-btn,
        .btn-cyan,
        .game-page .btn-purple {
            background-color: #5b2a86;
            background-image: linear-gradient(180deg, rgba(246, 213, 110, 0.22), rgba(88, 28, 135, 0.66));
            border: 1px solid rgba(246, 213, 110, 0.7);
            color: #fff7d6;
        }

        .game-page .arcade-pause-btn {
            background-image: url("assets/witch_warlock/ui/buttons/pause.png"), linear-gradient(180deg, rgba(246, 213, 110, 0.22), rgba(88, 28, 135, 0.66));
            background-size: 22px 22px, 100% 100%;
            background-position: 10px center, center;
            background-repeat: no-repeat;
            padding-left: 38px;
        }

        .game-page .arcade-help-btn {
            background-image: url("assets/witch_warlock/ui/buttons/round_book.png"), linear-gradient(180deg, rgba(246, 213, 110, 0.22), rgba(88, 28, 135, 0.66));
            background-size: 22px 22px, 100% 100%;
            background-position: 10px center, center;
            background-repeat: no-repeat;
            padding-left: 38px;
        }

        .game-page .arcade-restart-btn {
            background-image: url("assets/witch_warlock/ui/buttons/round_star.png"), linear-gradient(180deg, rgba(246, 213, 110, 0.22), rgba(88, 28, 135, 0.66));
            background-size: 22px 22px, 100% 100%;
            background-position: 10px center, center;
            background-repeat: no-repeat;
            padding-left: 38px;
        }

        .btn-cyan:hover { background-color: #f7e8c6; color: #1f1230; box-shadow: 0 0 15px #a855f7; }
        
        .game-page .btn-purple:hover { background-color: #d8b4fe; color: #1f1230; box-shadow: 0 0 15px #a855f7; }

        /* Upgrade Subtitles */
        .upgrade-desc {
            display: block;
            font-size: 0.8rem;
            font-weight: normal;
            margin-top: 4px;
            opacity: 0.9;
        }

        .phase-banner {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: #f7e8c6;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 18px #a855f7;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 5;
        }

        .phase-banner.visible {
            opacity: 1;
        }

        .summary-lines {
            color: #e9d5ff;
            line-height: 1.6;
            margin-bottom: 1rem;
            white-space: pre-line;
        }

        .upgrade-grid {
            display: grid;
            gap: 12px;
        }

        .upgrade-card {
            width: 100%;
            text-align: left;
            min-height: 96px;
            padding-left: 96px;
            position: relative;
            border-color: rgba(246, 213, 110, 0.75);
        }

        .upgrade-art {
            position: absolute;
            left: 12px;
            top: 50%;
            width: 64px;
            height: 64px;
            transform: translateY(-50%);
            border-radius: 12px;
            background: rgba(15, 10, 24, 0.72);
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(246, 213, 110, 0.65);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.45);
        }

        .upgrade-title {
            display: block;
            font-size: 1rem;
            color: #fff7d6;
        }

        .survivor-banner-img {
            display: block;
            width: min(280px, 82%);
            height: auto;
            margin: 0 auto 0.6rem;
            object-fit: contain;
            pointer-events: none;
        }

        .asset-preload-note {
            position: absolute;
            left: 12px;
            bottom: 12px;
            color: rgba(247, 232, 198, 0.7);
            font-size: 0.75rem;
            pointer-events: none;
        }

        #character-select-screen {
            background-image: linear-gradient(180deg, rgba(64, 32, 18, 0.96), rgba(31, 18, 48, 0.98));
            border: 2px solid #f6d56e;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.45);
            width: min(720px, 94vw);
            max-height: min(88vh, 660px);
            overflow-y: auto;
        }

        .character-select-copy {
            color: #e9d5ff;
            line-height: 1.45;
            margin-bottom: 1rem;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .character-card {
            min-height: 150px;
            padding: 10px;
            margin: 0;
            border: 1px solid rgba(246, 213, 110, 0.5);
            background: rgba(15, 10, 24, 0.74);
            color: #fff7d6;
        }

        .character-card.selected {
            border-color: #f6d56e;
            box-shadow: 0 0 18px rgba(246, 213, 110, 0.52);
            background: rgba(88, 28, 135, 0.72);
        }

        .character-card img {
            width: 100%;
            height: 104px;
            object-fit: contain;
            display: block;
            margin-bottom: 6px;
            pointer-events: none;
        }

        .character-card span {
            display: block;
            font-size: 0.78rem;
            line-height: 1.2;
        }

        .character-card .character-class {
            color: #d8b4fe;
            font-size: 0.68rem;
            margin-top: 3px;
        }

        .character-detail {
            text-align: left;
            color: #f7e8c6;
            background: rgba(15, 10, 24, 0.72);
            border: 1px solid rgba(246, 213, 110, 0.42);
            border-radius: 8px;
            padding: 12px 14px;
            margin: 0 0 12px;
            line-height: 1.35;
        }

        .character-detail h3 {
            margin: 0 0 4px;
            color: #f6d56e;
            font-size: 1rem;
        }

        .character-detail p {
            margin: 4px 0;
            color: #e9d5ff;
            font-size: 0.78rem;
        }

        .character-detail .stat-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .character-detail .stat-pill {
            border: 1px solid rgba(216, 180, 254, 0.38);
            border-radius: 999px;
            padding: 3px 7px;
            color: #fff7d6;
            background: rgba(88, 28, 135, 0.36);
            font-size: 0.68rem;
            white-space: nowrap;
        }

        .selected-character-label {
            color: #f6d56e;
            margin-bottom: 12px;
            font-weight: bold;
        }

        @media (max-width: 900px), (pointer: coarse), (hover: none) {
            .game-page .header,
            .game-page .arcade-controls,
            #xp-bar-container {
                width: min(96vw, 800px);
            }

            .game-page .header {
                font-size: 0.92rem;
                flex-wrap: wrap;
            }

            .stats {
                gap: 10px;
                justify-content: center;
            }

            .upgrade-card {
                min-height: 86px;
                padding-left: 82px;
                background-size: 72px 72px, 100% 100%;
            }

            .character-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .character-card {
                min-height: 136px;
            }

            .character-card img {
                height: 88px;
            }

            .character-detail {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="game-page">

    <div class="header">
        <span>WITCHLIGHT SURVIVOR</span>
        <div class="stats">
            <span>LVL: <span id="level-display" class="stat-highlight">1</span></span>
            <span>TIME: <span id="time-display" class="stat-highlight">0:00</span></span>
            <span>HP: <span id="hp-display" class="stat-highlight">100</span></span>
            <span>SCORE: <span id="score-display" class="stat-highlight">0</span></span>
            <span>PHASE: <span id="phase-display" class="stat-highlight">I</span></span>
        </div>
    </div>
    
    <div id="xp-bar-container">
        <div id="xp-bar"></div>
    </div>

        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="phase-banner" class="phase-banner"></div>
            <div id="asset-preload-note" class="asset-preload-note">Loading spellbook...</div>

            <!-- Character Select Screen -->
            <div id="character-select-screen" class="screen-overlay">
                <img class="survivor-banner-img" src="assets/witch_warlock/ui/panels/title_banner.png" alt="" aria-hidden="true">
                <h2 style="color: #f6d56e; text-shadow: 0 0 10px #a855f7;">CHOOSE YOUR CASTER</h2>
                <div class="character-select-copy">Pick a witch or warlock for this run. Each caster has different stats, a starting spell, and a passive.</div>
                <div id="character-grid" class="character-grid"></div>
                <div id="character-detail" class="character-detail"></div>
                <div id="selected-character-label" class="selected-character-label">Selected: Loading...</div>
                <button id="start-run-button" class="btn-purple" type="button">START RUN</button>
                <button class="lobby-btn" onclick="window.location.href='../../index.html'">RETURN TO MENU</button>
            </div>

            <!-- Pause Screen -->
            <div id="pause-screen" class="screen-overlay">
                <img class="survivor-banner-img" src="assets/witch_warlock/ui/panels/title_banner.png" alt="" aria-hidden="true">
                <h2 style="color: #f6d56e; text-shadow: 0 0 10px #a855f7;">PAUSED</h2>
                <button class="btn-purple" onclick="resumeFromPauseMenu()">RESUME</button>
                <button class="lobby-btn" onclick="window.location.href='../../index.html'">RETURN TO MENU</button>
            </div>
        
            <!-- Game Over Screen -->
            <div id="overlay-screen" class="screen-overlay">
            <img class="survivor-banner-img" src="assets/witch_warlock/ui/banners/defeat_banner.png" alt="" aria-hidden="true">
            <h2 id="end-title" style="color: #f43f5e; text-shadow: 0 0 10px #f43f5e;">DEFEAT</h2>
            <div class="survived-time">Survived: <span id="final-time">0:00</span></div>
            <div id="run-summary" class="summary-lines"></div>
            <button class="btn-cyan" onclick="resetGame()">RESTART RUN</button>
            <button class="lobby-btn" onclick="window.location.href='../../index.html'">RETURN TO MENU</button>
        </div>

        <!-- Level Up Screen -->
        <div id="level-up-screen" class="screen-overlay">
            <h2 style="color: #f6d56e; text-shadow: 0 0 10px #a855f7;">LEVEL UP</h2>
            <div id="upgrade-choices" class="upgrade-grid">
                <button class="btn-purple upgrade-card" onclick="selectUpgrade('damage')">
                    Increase Damage
                    <span class="upgrade-desc">Lasers hit 25% harder</span>
                </button>
                
                <button class="btn-purple upgrade-card" onclick="selectUpgrade('speed')">
                    Increase Speed
                    <span class="upgrade-desc">Move 15% faster</span>
                </button>
                
                <button class="btn-purple upgrade-card" onclick="selectUpgrade('firerate')">
                    Overclock Blasters
                    <span class="upgrade-desc">Shoot 15% faster</span>
                </button>
            </div>
        </div>
    </div>

    <script src="../../src/arcade/mobileControls.js"></script>

                    console.warn(`[Witchlight Survivor] Missing safe UI asset: ${key} (${definition.path})`);

            }));

                witchAssetsReady = results.some(result => result.ok);

                if (missing) console.warn(`[Witchlight Survivor] ${missing} UI assets failed to load; fallback UI remains active.`);

        function drawCroppedSpellIcon(key, x, y, w, h) {
            const image = getAsset(key);
            const definition = getAssetDefinition(key);
            if (!image || !definition || !definition.crop) return false;
            ctx.save();
            const crop = definition.crop;
            ctx.drawImage(image, crop[0], crop[1], crop[2], crop[3], x, y, w, h);
            ctx.restore();
            return true;
        }

        function getCroppedSpellIconDataUrl(key) {
            if (spellIconDataUrls[key]) return spellIconDataUrls[key];
            const image = getAsset(key);
            const definition = getAssetDefinition(key);
            if (!image || !definition || !definition.crop) return "";

            const iconCanvas = document.createElement("canvas");
            iconCanvas.width = 96;
            iconCanvas.height = 96;
            const iconCtx = iconCanvas.getContext && iconCanvas.getContext("2d");
            if (!iconCtx || !iconCanvas.toDataURL) return "";

            const crop = definition.crop;
            iconCtx.drawImage(image, crop[0], crop[1], crop[2], crop[3], 0, 0, iconCanvas.width, iconCanvas.height);
            try {
                spellIconDataUrls[key] = iconCanvas.toDataURL("image/png");
            } catch (error) {
                spellIconDataUrls[key] = "";
            }
            return spellIconDataUrls[key];
        }

        // Starting spell mapping uses existing weapon systems instead of adding a new combat framework.
        function applyStartingSpell(targetPlayer, character) {
            switch (character.startingSpell) {
                case "Potion Burst":
                    targetPlayer.projectileRadiusBonus = Math.max(targetPlayer.projectileRadiusBonus, 1.28);
                    break;
                case "Moonlit Grimoire":
                    targetPlayer.orbitBlades = 1;
                    targetPlayer.upgrades.orbit = 1;
                    break;
                case "Familiar Hex":
                    targetPlayer.fireRate = Math.max(135, targetPlayer.fireRate * 0.92);
                    break;
                case "Briar Crystal":
                    targetPlayer.pierce = 1;
                    targetPlayer.upgrades.pierce = 1;
                    break;
                case "Crystal Spikes":
                    targetPlayer.projectileCount = 2;
                    targetPlayer.upgrades.projectile = 1;
                    break;
                case "Lantern Rot":
                    targetPlayer.lifesteal = Math.max(targetPlayer.lifesteal, 0.022);
                    break;
            }
        }

            for (let i = phases.length - 1; i >= 0; i--) {
                if (gameTime >= phases[i].time) {
                    nextPhase = i;
                    break;
                }
            }
            if (nextPhase !== currentPhaseIndex) {
                currentPhaseIndex = nextPhase;
                showPhaseBanner(phases[currentPhaseIndex].title);
            }

        function spawnEnemy(type) {
            const phase = phases[currentPhaseIndex];
            const chosenType = type || phase.types[Math.floor(Math.random() * phase.types.length)];
            const stats = enemyTypes[chosenType];
            const angle = Math.random() * Math.PI * 2;
            const spawnRadius = stats.boss ? 700 : 620;
            const scale = stats.boss ? 1 + Math.floor(gameTime / 60) * 0.35 : 1 + gameTime * 0.018;
            const spriteId = chooseEnemySpriteId(stats.tier);
            enemies.push({
                id: nextEnemyId++,
                type: chosenType,
                tier: stats.tier,
                spriteId,
                x: player.x + Math.cos(angle) * spawnRadius,
                y: player.y + Math.sin(angle) * spawnRadius,
                radius: stats.radius,
                hp: Math.ceil(stats.hp * scale),
                maxHp: Math.ceil(stats.hp * scale),
                speed: stats.speed + Math.min(1.1, gameTime * 0.006),
                damage: stats.damage,
                xp: stats.xp,
                score: stats.score,
                color: stats.color,
                ranged: Boolean(stats.ranged),
                boss: Boolean(stats.boss),
                fireRate: stats.fireRate || 0,
                lastShot: Date.now() + Math.random() * 800,
                lastOrbitHit: 0
            });
        }

        // Enemy tier image selection. Hitboxes stay gameplay-sized; sprites are visual only.
        function chooseEnemySpriteId(tier) {
            const groups = {
                common: characterAssetManifest.enemies_common,
                medium: characterAssetManifest.enemies_medium,
                elite: characterAssetManifest.enemies_elite,
                miniboss: characterAssetManifest.enemies_miniboss,
                boss: characterAssetManifest.enemies_boss
            };
            const choices = groups[tier] || characterAssetManifest.enemies_common;
            const choice = choices[Math.floor(Math.random() * choices.length)];
            return choice ? choice.id : "";
        }

        function fireProjectile() {
            if (enemies.length === 0) return;
            let closest = null;
            let closestDist = Infinity;
            enemies.forEach(enemy => {
                const dist = getDist(player.x, player.y, enemy.x, enemy.y);
                if (dist < closestDist) {
                    closestDist = dist;
                    closest = enemy;
                }
            });
            if (!closest) return;

            const angle = Math.atan2(closest.y - player.y, closest.x - player.x);
            const spread = player.projectileCount > 1 ? 0.18 : 0;
            const start = -spread * (player.projectileCount - 1) / 2;
            for (let i = 0; i < player.projectileCount; i++) {
                const shotAngle = angle + start + spread * i;
                projectiles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(shotAngle) * player.projSpeed,
                    vy: Math.sin(shotAngle) * player.projSpeed,
                    radius: 5 * (player.projectileRadiusBonus || 1),
                    damage: player.projDamage,
                    pierce: player.pierce,
                    hitIds: {},
                    color: player.upgrades.firerate > 0 ? "#f97316" : "#d8b4fe",
                    life: 105
                });
            }
        }

        function buildUpgradeChoices() {
            upgradeChoices.replaceChildren();
            const available = Object.keys(upgradeDefinitions).filter(id => player.upgrades[id] < upgradeDefinitions[id].max);
            shuffle(available).slice(0, 3).forEach(id => {
                const upgrade = upgradeDefinitions[id];
                const button = document.createElement("button");
                button.type = "button";
                button.className = "btn-purple upgrade-card";
                const art = document.createElement("span");
                art.className = "upgrade-art";
                const iconUrl = getCroppedSpellIconDataUrl(upgrade.iconKey);
                if (iconUrl) art.style.backgroundImage = `url("${iconUrl}")`;
                const title = document.createElement("span");
                title.className = "upgrade-title";
                title.textContent = upgrade.title;
                const desc = document.createElement("span");
                desc.className = "upgrade-desc";
                desc.textContent = upgrade.desc;
                button.append(art, title, desc);
                button.addEventListener("click", () => selectUpgrade(id));
                upgradeChoices.appendChild(button);
            });
        }

        function shuffle(items) {
            const copy = items.slice();
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function selectUpgrade(type) {
            const upgrade = upgradeDefinitions[type];
            if (!upgrade) return;
            upgrade.apply();
            addFloatingText(player.x, player.y - 36, upgrade.title, "#a855f7");
            updateHud();
            levelUpScreen.style.display = "none";
            resumeFromOverlay();
        }

        function pauseForOverlay() {
            if (!isPaused) pauseStartTime = Date.now();
            isPaused = true;
        }

        function resumeFromOverlay() {
            startTime += Date.now() - pauseStartTime;
            lastFrameTime = Date.now();
            isPaused = isControlPaused;
        }

        function update() {
            if (isGameOver || isPaused) return;
            const now = Date.now();
            const dt = Math.min(2, (now - lastFrameTime) / 16.67);
            lastFrameTime = now;
            gameTime = Math.floor((now - startTime) / 1000);
            updatePhase();

            let dx = 0, dy = 0;
            if (keys.KeyW || keys.ArrowUp) dy -= 1;
            if (keys.KeyS || keys.ArrowDown) dy += 1;
            if (keys.KeyA || keys.ArrowLeft) dx -= 1;
            if (keys.KeyD || keys.ArrowRight) dx += 1;
            if (dx !== 0 || dy !== 0) {
                const length = Math.hypot(dx, dy);
                player.x += (dx / length) * player.speed * dt;
                player.y += (dy / length) * player.speed * dt;
            }

            if (now - lastFireTime > player.fireRate) {
                fireProjectile();
                lastFireTime = now;
            }

            const phase = phases[currentPhaseIndex];
            const spawnRate = Math.max(180, phase.spawnRate - gameTime * 3);
            if (now - lastSpawnTime > spawnRate) {
                for (let i = 0; i < phase.group; i++) spawnEnemy();
                lastSpawnTime = now;
            }
            if (gameTime >= nextBossTime && !enemies.some(enemy => enemy.boss)) spawnMiniBoss();
            if (!bossSpawned && gameTime >= 180 && !enemies.some(enemy => enemy.boss)) spawnFinalBoss();

            updateProjectiles(dt);
            updateEnemies(now, dt);
            updateEnemyProjectiles(dt);
            updateOrbitBlades(now, dt);
            updateGems(dt);
            updateEffects(dt);
            updateHud();
        }

        function updateProjectiles(dt) {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const projectile = projectiles[i];
                projectile.x += projectile.vx * dt;
                projectile.y += projectile.vy * dt;
                projectile.life -= dt;
                if (projectile.life <= 0) {
                    projectiles.splice(i, 1);
                    continue;
                }

                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (projectile.hitIds[enemy.id]) continue;
                    if (getDist(projectile.x, projectile.y, enemy.x, enemy.y) < projectile.radius + enemy.radius) {
                        damageEnemy(enemy, projectile.damage, projectile.color);
                        projectile.hitIds[enemy.id] = true;
                        if (enemy.hp <= 0) killEnemy(enemy, j);
                        if (projectile.pierce > 0) projectile.pierce--;
                        else projectiles.splice(i, 1);
                        break;
                    }
                }
            }
        }

        function updateEnemies(now, dt) {
            enemies.forEach(enemy => {
                const dist = getDist(player.x, player.y, enemy.x, enemy.y);
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                if (enemy.slowTimer > 0) enemy.slowTimer -= dt;
                const speedMult = enemy.slowTimer > 0 ? 0.62 : 1;
                if (!enemy.ranged || dist > 250) {
                    enemy.x += Math.cos(angle) * enemy.speed * speedMult * dt;
                    enemy.y += Math.sin(angle) * enemy.speed * speedMult * dt;
                }
                if (enemy.ranged && now - enemy.lastShot > enemy.fireRate) {
                    fireEnemyProjectile(enemy, angle);
                    enemy.lastShot = now;
                }
                if (dist < player.radius + enemy.radius) damagePlayer(enemy.damage * 0.045 * dt);
            });
        }

        function updateEnemyProjectiles(dt) {
            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                const projectile = enemyProjectiles[i];
                projectile.x += projectile.vx * dt;
                projectile.y += projectile.vy * dt;
                projectile.life -= dt;
                if (getDist(player.x, player.y, projectile.x, projectile.y) < player.radius + projectile.radius) {
                    damagePlayer(projectile.damage);
                    enemyProjectiles.splice(i, 1);
                } else if (projectile.life <= 0) {
                    enemyProjectiles.splice(i, 1);
                }
            }
        }

        function updateOrbitBlades(now, dt) {
            if (player.orbitBlades <= 0) return;
            player.orbitAngle += 0.045 * dt;
            const blades = getOrbitBladePositions();
            enemies.forEach((enemy, index) => {
                blades.forEach(blade => {
                    if (now - enemy.lastOrbitHit < 300) return;
                    if (getDist(blade.x, blade.y, enemy.x, enemy.y) < blade.radius + enemy.radius) {
                        enemy.lastOrbitHit = now;
                        damageEnemy(enemy, Math.max(14, player.projDamage * 0.55), "#22c55e");
                        if (enemy.hp <= 0) killEnemy(enemy, index);
                    }
                });
            });
        }

        function updateGems(dt) {
            for (let i = gems.length - 1; i >= 0; i--) {
                const gem = gems[i];
                const dist = getDist(player.x, player.y, gem.x, gem.y);
                if (dist < player.pickupRadius) {
                    const angle = Math.atan2(player.y - gem.y, player.x - gem.x);
                    const pull = 2.2 + (1 - dist / player.pickupRadius) * 7;
                    gem.x += Math.cos(angle) * pull * dt;
                    gem.y += Math.sin(angle) * pull * dt;
                }
                if (dist < player.radius + gem.radius + 8) {
                    const xpValue = Math.max(1, Math.round(gem.value * (player.xpGainMult || 1)));
                    player.xp += xpValue;
                    addFloatingText(gem.x, gem.y, `+${xpValue} XP`, "#eab308");
                    gems.splice(i, 1);
                    while (player.xp >= player.xpToNext) {
                        levelUp();
                        if (isPaused) break;
                    }
                    updateXpBar();
                }
            }
        }

        function updateEffects(dt) {
            particles = particles.filter(particle => particle.life > 0);
            particles.forEach(particle => {
                particle.x += particle.vx * dt;
                particle.y += particle.vy * dt;
                particle.vx *= 0.98;
                particle.vy *= 0.98;
                particle.life -= dt;
            });

            floatingTexts = floatingTexts.filter(text => text.life > 0);
            floatingTexts.forEach(text => {
                text.y -= text.speed * dt;
                text.life -= dt;
            });
        }

        function damageEnemy(enemy, amount, color) {
            let finalAmount = amount;
            let text = Math.ceil(finalAmount);
            let textColor = color || "#f8fafc";
            if (Math.random() < (player.critChance || 0)) {
                finalAmount *= 1.75;
                text = `CRIT ${Math.ceil(finalAmount)}`;
                textColor = "#f6d56e";
            }
            enemy.hp -= finalAmount;
            if (player.slowChance && Math.random() < player.slowChance) enemy.slowTimer = Math.max(enemy.slowTimer || 0, 85);
            if (player.lifesteal) player.hp = Math.min(player.maxHp, player.hp + finalAmount * player.lifesteal);
            addFloatingText(enemy.x, enemy.y - enemy.radius, text, textColor);
        }

        function damagePlayer(amount) {
            const mitigation = Math.max(0.7, 1 - (player.armor || 0) * 0.06);
            player.hp -= amount * mitigation;
            if (player.hp <= 0) gameOver();
        }

        function killEnemy(enemy, index) {
            if (!enemies[index] || enemies[index].id !== enemy.id) index = enemies.findIndex(item => item.id === enemy.id);
            if (index < 0) return;
            kills++;
            const points = Math.floor((enemy.score + Math.floor(gameTime / 12)) * (1 + (player.luck || 0) * 0.15));
            score += points;
            gems.push({ x: enemy.x, y: enemy.y, radius: enemy.boss ? 8 : 5, value: enemy.xp });
            addFloatingText(enemy.x, enemy.y - enemy.radius - 8, `+${points}`, "#f8fafc");
            spawnParticles(enemy.x, enemy.y, enemy.color, enemy.boss ? 44 : 16);
            enemies.splice(index, 1);
        }

        function fireEnemyProjectile(enemy, angle) {
            enemyProjectiles.push({
                x: enemy.x,
                y: enemy.y,
                vx: Math.cos(angle) * 4.2,
                vy: Math.sin(angle) * 4.2,
                radius: 5,
                damage: enemy.damage,
                color: enemy.color,
                life: 130
            });
        }

        function getOrbitBladePositions() {
            const positions = [];
            const distance = 44;
            for (let i = 0; i < player.orbitBlades; i++) {
                const angle = player.orbitAngle + Math.PI * 2 * i / player.orbitBlades;
                positions.push({ x: player.x + Math.cos(angle) * distance, y: player.y + Math.sin(angle) * distance, radius: 9 });
            }
            return positions;
        }

        function addFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text: String(text), color, life: 54, speed: 0.7 });
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3.4;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 2 + Math.random() * 2.5,
                    color,
                    life: 18 + Math.random() * 18
                });
            }
        }

        function draw() {
            ctx.fillStyle = "#120d1d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!player) {
                drawCharacterSelectBackdrop();
                return;
            }
            ctx.save();
            ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);
            drawGrid();
            drawGems();
            drawEnemies();
            drawProjectiles();
            drawOrbitBlades();
            drawEffects();
            drawPlayer();
            ctx.restore();
            drawWitchHud();
        }

        function drawCharacterSelectBackdrop() {
            ctx.fillStyle = "#120d1d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.strokeStyle = "rgba(216, 180, 254, 0.18)";
            ctx.lineWidth = 3;
            for (let radius = 70; radius <= 310; radius += 60) {
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.fillStyle = "rgba(246, 213, 110, 0.12)";
            for (let i = 0; i < 18; i++) {
                const angle = i * Math.PI * 2 / 18;
                ctx.beginPath();
                ctx.arc(Math.cos(angle) * 240, Math.sin(angle) * 170, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            drawCenteredHudText("Choose your caster to begin", canvas.width / 2, canvas.height - 58, "bold 18px Segoe UI", "#f7e8c6");
        }

        // Draw the loaded floor texture in world space so it scrolls with the camera.
        function drawGroundTexture() {
            if (!groundTextureImage) return false;
            if (!groundTexturePattern) {
                const tile = document.createElement("canvas");
                tile.width = Math.max(64, Math.round(groundTextureImage.naturalWidth * GROUND_TEXTURE_SCALE));
                tile.height = Math.max(64, Math.round(groundTextureImage.naturalHeight * GROUND_TEXTURE_SCALE));
                const tileCtx = tile.getContext("2d");
                if (!tileCtx) return false;
                tileCtx.drawImage(groundTextureImage, 0, 0, tile.width, tile.height);
                groundTexturePattern = ctx.createPattern(tile, "repeat");
            }
            if (!groundTexturePattern) return false;
            const margin = 140;
            const startX = player.x - canvas.width / 2 - margin;
            const startY = player.y - canvas.height / 2 - margin;
            ctx.save();
            ctx.globalAlpha = 0.72;
            ctx.fillStyle = groundTexturePattern;
            ctx.fillRect(startX, startY, canvas.width + margin * 2, canvas.height + margin * 2);
            ctx.restore();
            return true;
        }

        function drawGrid() {
            drawGroundTexture();
            drawWorldMagicBackdrop();
            ctx.strokeStyle = "rgba(88, 28, 135, 0.42)";
            ctx.lineWidth = 2;
            const gridSize = 100;
            const startX = Math.floor((player.x - canvas.width / 2) / gridSize) * gridSize;
            const startY = Math.floor((player.y - canvas.height / 2) / gridSize) * gridSize;
            ctx.beginPath();
            for (let x = startX; x < startX + canvas.width + gridSize; x += gridSize) {
                ctx.moveTo(x, startY);
                ctx.lineTo(x, startY + canvas.height + gridSize * 2);
            }
            for (let y = startY; y < startY + canvas.height + gridSize; y += gridSize) {
                ctx.moveTo(startX, y);
                ctx.lineTo(startX + canvas.width + gridSize * 2, y);
            }
            ctx.stroke();
        }

        function drawWorldMagicBackdrop() {
            const centerX = Math.floor(player.x / 260) * 260;
            const centerY = Math.floor(player.y / 260) * 260;
            ctx.save();
            ctx.strokeStyle = "rgba(216, 180, 254, 0.11)";
            ctx.lineWidth = 3;
            for (let x = centerX - 780; x <= centerX + 780; x += 260) {
                for (let y = centerY - 780; y <= centerY + 780; y += 260) {
                    ctx.beginPath();
                    ctx.arc(x, y, 42, 0, Math.PI * 2);
                    ctx.moveTo(x - 30, y);
                    ctx.lineTo(x + 30, y);
                    ctx.moveTo(x, y - 30);
                    ctx.lineTo(x, y + 30);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // UI drawing helpers for the Witch & Warlock PNG overlay.
        function drawWitchHud() {
            drawHudPanel(16, 14, 250, 76);
            drawHudIcon("health_icon", 30, 30, 32, 32, "#f43f5e");
            drawHudBar(72, 30, 130, 14, player.hp / player.maxHp, "#dc2626", "#fda4af");
            ctx.fillStyle = "#fff7d6";
            ctx.font = "bold 12px Segoe UI";
            ctx.textAlign = "left";
            ctx.fillText(`${Math.max(0, Math.ceil(player.hp))}/${player.maxHp}`, 74, 61);
            ctx.fillStyle = "#d8b4fe";
            ctx.font = "bold 10px Segoe UI";
            ctx.fillText(player.characterName || "Caster", 74, 76);
            drawPlayerPortrait(238, 22, 42);

            drawHudPanel(282, 12, 236, 58);
            drawCenteredHudText(formatTime(gameTime), 400, 47, "bold 24px Segoe UI", "#f7e8c6");

            drawHudPanel(574, 14, 210, 68);
            drawHudIcon("purple_crystal", 592, 30, 30, 30, "#a855f7");
            ctx.fillStyle = "#fff7d6";
            ctx.font = "bold 15px Segoe UI";
            ctx.textAlign = "left";
            ctx.fillText(`Score ${score}`, 630, 43);
            ctx.fillStyle = "#e9d5ff";
            ctx.font = "bold 12px Segoe UI";
            ctx.fillText(`Kills ${kills}  Phase ${phases[currentPhaseIndex].label}`, 630, 62);

            drawHudPanel(164, canvas.height - 62, 472, 26);
            drawHudBar(188, canvas.height - 52, 424, 8, player.xp / player.xpToNext, "#7c3aed", "#f6d56e");
            drawCenteredHudText(`Level ${player.level}   ${player.xp}/${player.xpToNext} XP`, 400, canvas.height - 66, "bold 12px Segoe UI", "#f7e8c6");
            drawSpellSlots();
        }

        function drawPlayerPortrait(x, y, size) {
            ctx.save();
            ctx.fillStyle = "rgba(15, 10, 24, 0.82)";
            ctx.strokeStyle = "rgba(246, 213, 110, 0.72)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y + size / 2, size / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            const image = getCharacterAsset(player.spriteId);
            if (image) drawImageCentered(image, x, y + size / 2 + 3, size * 0.92);
            ctx.restore();
        }

        function drawHudPanel(x, y, w, h, assetKey) {
            if (drawAsset(assetKey, x, y, w, h)) return;
            ctx.save();
            ctx.fillStyle = "rgba(30, 20, 48, 0.78)";
            ctx.strokeStyle = "rgba(246, 213, 110, 0.7)";
            ctx.lineWidth = 2;
            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);
            ctx.restore();
        }

        function drawHudIcon(assetKey, x, y, w, h, fallbackColor) {
            if (drawAsset(assetKey, x, y, w, h)) return;
            ctx.save();
            ctx.fillStyle = fallbackColor;
            ctx.beginPath();
            ctx.arc(x + w / 2, y + h / 2, Math.min(w, h) / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawHudBar(x, y, w, h, ratio, color, glow) {
            const fillRatio = Math.max(0, Math.min(1, ratio || 0));
            ctx.save();
            ctx.fillStyle = "rgba(15, 10, 24, 0.82)";
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 10;
            ctx.shadowColor = glow;
            const gradient = ctx.createLinearGradient(x, y, x + w, y);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, glow);
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, w * fillRatio, h);
            ctx.restore();
        }

        function drawCenteredHudText(text, x, y, font, color) {
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#a855f7";
            ctx.fillStyle = color;
            ctx.font = font;
            ctx.textAlign = "center";
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function drawSpellSlots() {
            const unlocked = getVisibleSpellSlots();
            const size = 46;
            const gap = 10;
            const total = 5 * size + 4 * gap;
            const startX = canvas.width / 2 - total / 2;
            const y = canvas.height - 110;
            for (let i = 0; i < 5; i++) {
                const x = startX + i * (size + gap);
                drawAsset(`spell_slot_${i + 1}`, x, y, size, size) || drawAsset("spell_slot", x, y, size, size);
                const spell = unlocked[i];
                if (spell) {
                    drawCroppedSpellIcon(spell.iconKey, x + 7, y + 7, size - 14, size - 14);
                    ctx.fillStyle = "#fff7d6";
                    ctx.font = "bold 11px Segoe UI";
                    ctx.textAlign = "center";
                    ctx.fillText(`x${spell.count}`, x + size / 2, y + size + 12);
                }
            }
        }

        function getVisibleSpellSlots() {
            return Object.keys(upgradeDefinitions)
                .map(id => ({ id, ...upgradeDefinitions[id], count: player.upgrades[id] || 0 }))
                .filter(item => item.count > 0)
                .slice(0, 5);
        }

        function drawAsset(key, x, y, w, h, alpha) {
            const image = getAsset(key);
            if (!image) return false;
            ctx.save();
            if (alpha !== undefined) ctx.globalAlpha = alpha;
            ctx.drawImage(image, x, y, w, h);
            ctx.restore();
            return true;
        }

        function drawGems() {
            gems.forEach(gem => {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#d8b4fe";
                if (!drawAsset("xp_star", gem.x - gem.radius - 4, gem.y - gem.radius - 4, (gem.radius + 4) * 2, (gem.radius + 4) * 2)) {
                    ctx.fillStyle = "#d8b4fe";
                    ctx.beginPath();
                    ctx.arc(gem.x, gem.y, gem.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = "rgba(234, 179, 8, 0.18)";
                ctx.beginPath();
                ctx.arc(gem.x, gem.y, gem.radius + 7, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.shadowBlur = enemy.boss ? 24 : 12;
                ctx.shadowColor = enemy.color;
                if (!drawEnemySprite(enemy)) {
                    ctx.fillStyle = enemy.color;
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                    ctx.fill();
                    if (enemy.ranged) {
                        ctx.fillStyle = "#0f172a";
                        ctx.beginPath();
                        ctx.arc(enemy.x, enemy.y, enemy.radius * 0.45, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                if (enemy.boss) {
                    drawAsset("boss_badge", enemy.x - 18, enemy.y - enemy.radius - 42, 36, 36);
                }
                if (enemy.hp < enemy.maxHp || enemy.boss) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
                    ctx.fillRect(enemy.x - enemy.radius, enemy.y - enemy.radius - 10, enemy.radius * 2, 4);
                    ctx.fillStyle = "#22c55e";
                    ctx.fillRect(enemy.x - enemy.radius, enemy.y - enemy.radius - 10, enemy.radius * 2 * Math.max(0, enemy.hp / enemy.maxHp), 4);
                }
            });
        }

        function drawEnemySprite(enemy) {
            const image = getCharacterAsset(enemy.spriteId);
            if (!image) return false;
            const size = ENEMY_SPRITE_SIZES[enemy.tier] || ENEMY_SPRITE_SIZES.common;
            drawImageCentered(image, enemy.x, enemy.y, size);
            return true;
        }

        function drawProjectiles() {
            projectiles.forEach(projectile => {
                ctx.shadowBlur = 14;
                ctx.shadowColor = projectile.color;
                ctx.fillStyle = projectile.color;
                ctx.beginPath();
                ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            enemyProjectiles.forEach(projectile => {
                ctx.shadowBlur = 12;
                ctx.shadowColor = projectile.color;
                ctx.fillStyle = projectile.color;
                ctx.beginPath();
                ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawOrbitBlades() {
            getOrbitBladePositions().forEach(blade => {
                ctx.shadowBlur = 16;
                ctx.shadowColor = "#d8b4fe";
                if (!drawCroppedSpellIcon("moonlight_orb", blade.x - blade.radius, blade.y - blade.radius, blade.radius * 2, blade.radius * 2)) {
                    ctx.fillStyle = "#d8b4fe";
                    ctx.beginPath();
                    ctx.arc(blade.x, blade.y, blade.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawEffects() {
            particles.forEach(particle => {
                ctx.globalAlpha = Math.max(0, particle.life / 28);
                ctx.shadowBlur = 8;
                ctx.shadowColor = particle.color;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            floatingTexts.forEach(text => {
                ctx.globalAlpha = Math.max(0, text.life / 54);
                ctx.shadowBlur = 8;
                ctx.shadowColor = text.color;
                ctx.fillStyle = text.color;
                ctx.font = "bold 16px Segoe UI";
                ctx.textAlign = "center";
                ctx.fillText(text.text, text.x, text.y);
            });
            ctx.globalAlpha = 1;
        }

        function drawPlayer() {
            ctx.shadowBlur = 16;
            ctx.shadowColor = "#a855f7";
            if (!drawPlayerSprite()) {
                ctx.fillStyle = "#4c1d95";
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#f7e8c6";
                ctx.beginPath();
                ctx.arc(player.x, player.y - 6, player.radius * 0.58, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#1f1230";
                ctx.beginPath();
                ctx.moveTo(player.x - 13, player.y - 14);
                ctx.lineTo(player.x, player.y - 34);
                ctx.lineTo(player.x + 13, player.y - 14);
                ctx.closePath();
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#f43f5e";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeStyle = "#22c55e";
            ctx.beginPath();
            const hpRatio = Math.max(0, player.hp / player.maxHp);
            ctx.arc(player.x, player.y, player.radius + 8, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * hpRatio);
            ctx.stroke();
        }

        function drawPlayerSprite() {
            const image = getCharacterAsset(player.spriteId);
            if (!image) return false;
            drawImageCentered(image, player.x, player.y + PLAYER_SPRITE_Y_OFFSET, PLAYER_SPRITE_SIZE);
            return true;
        }

        function drawImageCentered(image, centerX, centerY, targetHeight) {
            const ratio = image.naturalWidth && image.naturalHeight ? image.naturalWidth / image.naturalHeight : 1;
            const width = targetHeight * ratio;
            ctx.drawImage(image, centerX - width / 2, centerY - targetHeight / 2, width, targetHeight);
        }

        function gameOver() {
            if (isGameOver) return;
            isGameOver = true;
            isPaused = false;
            isControlPaused = false;
            clearTimeout(phaseBannerTimer);
            phaseBanner.classList.remove("visible");
            const bestTime = window.ArcadeStorage.setHighScore("survivor", gameTime);
            finalTimeDisplay.innerText = formatTime(gameTime);
            runSummary.textContent = `Caster: ${player.characterName}\nBest Time: ${formatTime(bestTime)}\nScore: ${score}\nLevel: ${player.level}\nKills: ${kills}\nPhase Reached: ${phases[currentPhaseIndex].label}`;
            overlayScreen.style.display = "block";
            pauseScreen.style.display = "none";
        }

        function resetGame() {
            if (animationId) cancelAnimationFrame(animationId);
            clearTimeout(phaseBannerTimer);
            initGame();
            gameLoop();
        }

        function resumeFromPauseMenu() {
            const pauseButton = document.querySelector(".arcade-pause-btn");
            if (pauseButton) pauseButton.click();
        }

        window.ArcadeControls.init({
            instructions: [
                "Move with WASD, arrow keys, or the mobile joystick.",
                "Spells fire automatically at nearby enemies.",
                "Collect glowing XP stars to level up and choose spell upgrades.",
                "Enemy phases add fast, tank, ranged, and mini-boss threats over time.",
                "Esc pauses, R restarts, H opens this panel."
            ],
            onRestart: () => {
                if (runStarted) resetGame();
                else showCharacterSelect();
            },
            isPaused: () => isControlPaused,
            onPauseToggle: () => {
                if (!runStarted || isGameOver || characterSelectScreen.style.display === "block" || levelUpScreen.style.display === "block") return isControlPaused;
                if (!isControlPaused) {
                    isControlPaused = true;
                    isPaused = true;
                    pauseScreen.style.display = "block";
                    pauseStartTime = Date.now();
                    keys = {};
                } else {
                    isControlPaused = false;
                    pauseScreen.style.display = "none";
                    startTime += Date.now() - pauseStartTime;
                    lastFrameTime = Date.now();
                    isPaused = false;
                }
                return isControlPaused;
            }
        });

        window.ArcadeMobileControls.createVirtualJoystick({
            onMove: (x, y) => {
                keys.ArrowLeft = x < -0.28;
                keys.ArrowRight = x > 0.28;
                keys.ArrowUp = y < -0.28;
                keys.ArrowDown = y > 0.28;
            },
            onEnd: () => {
                keys.ArrowLeft = false;
                keys.ArrowRight = false;
                keys.ArrowUp = false;
                keys.ArrowDown = false;
            },
            shouldHide: () => !runStarted || isGameOver || isControlPaused || characterSelectScreen.style.display === "block" || overlayScreen.style.display === "block" || pauseScreen.style.display === "block" || levelUpScreen.style.display === "block"
        });

        function gameLoop() {
            update();
            draw();
            if (!isGameOver) animationId = requestAnimationFrame(gameLoop);
        }

        function startSurvivor() {
            initGame();
            gameLoop();
        }

        preloadGameAssets()
            .catch(error => {
                console.warn("[Witchlight Survivor] Asset preload failed; using fallback UI where needed.", error);
                if (assetPreloadNote) assetPreloadNote.style.display = "none";
            })
            .finally(() => {
                buildCharacterSelect();
                showCharacterSelect();
            });
    </script>
</body>
</html>
