<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo & Grey: Mini World</title>
    <link rel="stylesheet" href="../../src/styles/base.css">
    <link rel="stylesheet" href="../../src/styles/game-shell.css">
    <link rel="stylesheet" href="../../src/styles/mobile-controls.css">
    <style>
        .game-page {
            background: radial-gradient(circle at top, #4f8f68 0%, #1f4d3b 48%, #0f172a 100%);
        }

        .game-page .header,
        .game-page .arcade-controls,
        #world-status {
            width: 820px;
        }

        .game-page .header {
            font-size: 1.05rem;
            gap: 16px;
        }

        #world-status {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            color: #f8fafc;
            font-weight: bold;
        }

        .mini-stat {
            color: #fde68a;
            text-shadow: 0 0 10px rgba(253, 230, 138, 0.75);
        }

        .game-page canvas {
            background: #77c970;
            border-color: #fde68a;
            box-shadow: 0 0 26px rgba(253, 230, 138, 0.35);
        }

        .mini-overlay {
            width: min(470px, 90vw);
            border: 2px solid #fde68a;
            box-shadow: 0 0 24px rgba(253, 230, 138, 0.35);
        }

        .mini-overlay h2 {
            color: #fde68a;
            text-shadow: 0 0 12px rgba(253, 230, 138, 0.8);
            font-size: 1.9rem;
        }

        .mini-copy,
        #shop-copy {
            color: #dbeafe;
            line-height: 1.5;
            margin-bottom: 1rem;
            white-space: pre-line;
        }

        .mini-save-summary {
            padding: 8px 10px;
            margin-bottom: 12px;
            border: 1px solid rgba(253, 230, 138, 0.55);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.45);
            color: #fde68a;
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .character-buttons,
        .shop-buttons {
            display: grid;
            gap: 10px;
            margin-bottom: 10px;
        }

        .character-buttons {
            grid-template-columns: 1fr 1fr;
        }

        .character-buttons button,
        .shop-buttons button {
            min-height: 48px;
            line-height: 1.25;
        }

        .character-buttons button.selected,
        .shop-buttons button.equipped {
            outline: 3px solid #fde68a;
            box-shadow: 0 0 18px rgba(253, 230, 138, 0.45);
        }

        .shop-buttons button.locked {
            background: #475569;
            color: #e2e8f0;
        }

        #toast-message {
            position: absolute;
            left: 16px;
            top: 16px;
            max-width: 310px;
            padding: 8px 12px;
            border: 1px solid rgba(253, 230, 138, 0.85);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.74);
            color: #f8fafc;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        #toast-message.visible {
            opacity: 1;
        }

        @media (max-width: 900px), (pointer: coarse), (hover: none) {
            .game-page .header,
            .game-page .arcade-controls,
            #world-status {
                width: min(96vw, 820px);
            }

            .game-page .header,
            #world-status {
                flex-wrap: wrap;
                font-size: 0.88rem;
            }

            .mini-overlay {
                padding: 1.25rem;
            }

            .character-buttons {
                grid-template-columns: 1fr;
            }

            .mobile-control-btn {
                min-width: 70px;
                min-height: 70px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="game-page">
    <div class="header">
        <span>THEO & GREY: MINI WORLD</span>
        <span>BEST TICKETS: <span id="best-display" class="mini-stat">0</span></span>
    </div>

    <div id="world-status">
        <span>PLAYER: <span id="player-display" class="mini-stat">Theo</span></span>
        <span>TICKETS: <span id="ticket-display" class="mini-stat">0</span></span>
        <span>QUEST: <span id="quest-display" class="mini-stat">Find Biscuit</span></span>
        <span>STYLE: <span id="cosmetic-display" class="mini-stat">None</span></span>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="820" height="540"></canvas>
        <div id="toast-message"></div>

        <div id="start-screen" class="screen-overlay mini-overlay">
            <h2>Mini World</h2>
            <div class="mini-copy">Choose Theo or Grey, collect shiny tickets, help Biscuit find bones, and visit the tiny shop for cozy styles.</div>
            <div id="start-summary" class="mini-save-summary"></div>
            <div class="character-buttons">
                <button id="theo-select" type="button" onclick="selectCharacter('Theo')">THEO<br><small>Sunny explorer</small></button>
                <button id="grey-select" type="button" onclick="selectCharacter('Grey')">GREY<br><small>Cozy helper</small></button>
            </div>
            <button type="button" onclick="startGame()">START PLAYING</button>
            <button type="button" class="lobby-btn" onclick="window.location.href='../../index.html'">BACK TO LOBBY</button>
        </div>

        <div id="shop-screen" class="screen-overlay mini-overlay">
            <h2>Tiny Shop</h2>
            <div id="shop-copy"></div>
            <div class="shop-buttons" id="shop-buttons"></div>
            <button type="button" class="lobby-btn" onclick="closeShop()">KEEP PLAYING</button>
        </div>
    </div>

    <script src="../../src/arcade/storage.js"></script>
    <script src="../../src/arcade/controls.js"></script>
    <script src="../../src/arcade/mobileControls.js"></script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startScreen = document.getElementById("start-screen");
        const shopScreen = document.getElementById("shop-screen");
        const startSummary = document.getElementById("start-summary");
        const shopCopy = document.getElementById("shop-copy");
        const shopButtons = document.getElementById("shop-buttons");
        const toastMessage = document.getElementById("toast-message");
        const bestDisplay = document.getElementById("best-display");
        const playerDisplay = document.getElementById("player-display");
        const ticketDisplay = document.getElementById("ticket-display");
        const questDisplay = document.getElementById("quest-display");
        const cosmeticDisplay = document.getElementById("cosmetic-display");
        const theoSelectButton = document.getElementById("theo-select");
        const greySelectButton = document.getElementById("grey-select");

        const progressKey = "arcade.progress.mini-world";
        const keys = {};
        const coins = [];
        const bones = [];
        const effects = [];
        const sparkleDots = [];
        const shopItems = [
            { id: "redHat", label: "Red Hat", cost: 25 },
            { id: "blueTrail", label: "Blue Trail", cost: 40 },
            { id: "lanternGlow", label: "Lantern Glow", cost: 55 }
        ];
        const walls = [
            { x: 88, y: 88, w: 98, h: 54 },
            { x: 520, y: 110, w: 122, h: 52 },
            { x: 190, y: 372, w: 70, h: 58 },
            { x: 622, y: 332, w: 84, h: 58 },
            { x: 390, y: 260, w: 38, h: 110 },
            { x: 438, y: 318, w: 38, h: 52 }
        ];
        const zones = {
            shop: { x: 626, y: 54, w: 156, h: 96 },
            biscuit: { x: 54, y: 364, w: 128, h: 118 },
            playground: { x: 270, y: 58, w: 186, h: 130 },
            obby: { x: 500, y: 412, w: 220, h: 58 }
        };
        const cozyDecorations = [
            { type: "tree", x: 46, y: 174 },
            { type: "tree", x: 778, y: 378 },
            { type: "bench", x: 244, y: 64 },
            { type: "bench", x: 562, y: 72 },
            { type: "pinwheel", x: 474, y: 170 },
            { type: "pinwheel", x: 118, y: 330 },
            { type: "lantern", x: 742, y: 506 },
            { type: "lantern", x: 42, y: 512 }
        ];

        let player;
        let progress;
        let selectedCharacter = "Theo";
        let selectedCosmetic = "None";
        let isPaused = false;
        let gameStarted = false;
        let animationId;
        let lastTime = 0;
        let toastTimer = 0;
        let questComplete = false;
        let bonesReturned = false;
        let wasInShopZone = false;

        document.addEventListener("keydown", event => keys[event.code] = true);
        document.addEventListener("keyup", event => keys[event.code] = false);

        function defaultProgress() {
            return {
                totalTickets: 0,
                bestTickets: 0,
                selectedCharacter: "Theo",
                selectedCosmetic: "None",
                unlockedCosmetics: []
            };
        }

        function readProgress() {
            try {
                const saved = Object.assign(defaultProgress(), JSON.parse(localStorage.getItem(progressKey)) || {});
                if (!Array.isArray(saved.unlockedCosmetics)) saved.unlockedCosmetics = [];
                return saved;
            } catch (error) {
                return defaultProgress();
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem(progressKey, JSON.stringify(progress));
            } catch (error) {
                // Progress is optional when browser storage is restricted.
            }
        }

        function selectCharacter(name) {
            selectedCharacter = name;
            if (progress) {
                progress.selectedCharacter = name;
                saveProgress();
            }
            if (player) player.name = name;
            showToast(`${name} is ready!`);
            updateHud();
            updateStartSummary();
            draw();
        }

        function startGame() {
            if (animationId) cancelAnimationFrame(animationId);
            progress = readProgress();
            selectedCharacter = progress.selectedCharacter || selectedCharacter;
            selectedCosmetic = progress.selectedCosmetic || "None";
            setupWorld();
            gameStarted = true;
            isPaused = false;
            startScreen.style.display = "none";
            shopScreen.style.display = "none";
            lastTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        function setupWorld() {
            player = {
                name: selectedCharacter,
                x: 104,
                y: 252,
                radius: 17,
                speed: 3.9
            };
            coins.length = 0;
            bones.length = 0;
            effects.length = 0;
            sparkleDots.length = 0;
            questComplete = false;
            bonesReturned = false;
            wasInShopZone = false;
            createCoinTrail();
            createBones();
            createSparkleDots();
            updateHud();
            updateStartSummary();
            showToast("Welcome to Mini World!");
        }

        function createCoinTrail() {
            const trail = [
                [132, 246], [184, 230], [240, 216], [300, 214], [360, 226], [426, 224],
                [488, 212], [548, 186], [620, 176], [716, 184], [744, 244], [700, 292],
                [628, 314], [550, 344], [500, 402], [562, 452], [636, 452], [710, 452],
                [446, 448], [340, 430], [270, 336], [210, 300], [152, 316]
            ];
            trail.forEach((point, index) => {
                coins.push({
                    x: point[0],
                    y: point[1],
                    radius: index % 5 === 0 ? 12 : 9,
                    value: index % 5 === 0 ? 5 : 2,
                    collected: false,
                    bob: Math.random() * Math.PI * 2
                });
            });
        }

        function createBones() {
            [[312, 112], [596, 272], [256, 458]].forEach(point => {
                bones.push({ x: point[0], y: point[1], radius: 12, collected: false, bob: Math.random() * Math.PI * 2 });
            });
        }

        function createSparkleDots() {
            for (let i = 0; i < 26; i++) {
                sparkleDots.push({
                    x: randomRange(28, canvas.width - 28),
                    y: randomRange(28, canvas.height - 28),
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        function gameLoop(timestamp) {
            const dt = Math.min(2, (timestamp - lastTime) / 16.67);
            lastTime = timestamp;
            update(dt);
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            if (!gameStarted || isPaused || shopScreen.style.display === "block") return;
            movePlayer(dt);
            collectItems();
            updateEffects(dt);
            updateToast(dt);
        }

        function movePlayer(dt) {
            let dx = 0;
            let dy = 0;
            if (keys.ArrowLeft || keys.KeyA) dx -= 1;
            if (keys.ArrowRight || keys.KeyD) dx += 1;
            if (keys.ArrowUp || keys.KeyW) dy -= 1;
            if (keys.ArrowDown || keys.KeyS) dy += 1;
            if (dx === 0 && dy === 0) return;

            const length = Math.hypot(dx, dy);
            dx /= length;
            dy /= length;

            const nextX = clamp(player.x + dx * player.speed * dt, player.radius, canvas.width - player.radius);
            const nextY = clamp(player.y + dy * player.speed * dt, player.radius, canvas.height - player.radius);

            if (!hitsWall(nextX, player.y, player.radius)) player.x = nextX;
            if (!hitsWall(player.x, nextY, player.radius)) player.y = nextY;
        }

        function collectItems() {
            coins.forEach(coin => {
                if (coin.collected || getDist(player.x, player.y, coin.x, coin.y) > player.radius + coin.radius) return;
                coin.collected = true;
                addTickets(coin.value);
                addTextEffect(coin.x, coin.y, "#fde68a", `+${coin.value} tickets`);
                addSparkleBurst(coin.x, coin.y, "#fde68a", 6);
                showToast("Shiny tickets!");
            });

            bones.forEach(bone => {
                if (bone.collected || getDist(player.x, player.y, bone.x, bone.y) > player.radius + bone.radius + 2) return;
                bone.collected = true;
                addTickets(3);
                addTextEffect(bone.x, bone.y, "#f8fafc", "+bone");
                addSparkleBurst(bone.x, bone.y, "#f8fafc", 10);
                showToast("Biscuit bone found!");
            });

            if (!bonesReturned && bones.every(bone => bone.collected) && pointInRect(player.x, player.y, zones.biscuit)) {
                bonesReturned = true;
                questComplete = true;
                addTickets(30);
                addTextEffect(player.x, player.y - 24, "#fbbf24", "Quest complete! +30");
                addQuestCelebration();
                showToast("Biscuit says thank you!");
            }

            const inShopZone = pointInRect(player.x, player.y, zones.shop);
            if (inShopZone && !wasInShopZone) {
                openShop();
            }
            wasInShopZone = inShopZone;
        }

        function addTickets(amount) {
            progress.totalTickets += amount;
            progress.bestTickets = Math.max(progress.bestTickets || 0, progress.totalTickets);
            window.ArcadeStorage.setHighScore("mini-world", progress.bestTickets);
            saveProgress();
            updateHud();
        }

        function openShop() {
            if (shopScreen.style.display === "block") return;
            shopScreen.style.display = "block";
            renderShop();
        }

        function closeShop() {
            shopScreen.style.display = "none";
            lastTime = performance.now();
        }

        function renderShop() {
            const unlocked = progress.unlockedCosmetics || [];
            shopCopy.textContent = `Tickets: ${progress.totalTickets}\nCurrent style: ${selectedCosmetic || "None"}\nUnlock a style, then wear it while you explore.`;
            shopButtons.innerHTML = "";
            shopItems.forEach(item => {
                const button = document.createElement("button");
                const owned = unlocked.includes(item.id);
                const equipped = selectedCosmetic === item.label;
                button.type = "button";
                button.className = equipped ? "equipped" : (!owned && progress.totalTickets < item.cost ? "locked" : "");
                button.textContent = equipped ? `${item.label} equipped` : owned ? `Wear ${item.label}` : `Unlock ${item.label} - ${item.cost} tickets`;
                button.addEventListener("click", () => {
                    if (!owned && progress.totalTickets < item.cost) {
                        showToast("Need more tickets!");
                        return;
                    }
                    if (!owned) {
                        progress.totalTickets -= item.cost;
                        progress.unlockedCosmetics.push(item.id);
                    }
                    progress.selectedCosmetic = item.label;
                    selectedCosmetic = item.label;
                    saveProgress();
                    renderShop();
                    updateHud();
                    updateStartSummary();
                    showToast(`${item.label} equipped!`);
                });
                shopButtons.appendChild(button);
            });

            const noneButton = document.createElement("button");
            noneButton.type = "button";
            noneButton.className = selectedCosmetic === "None" ? "equipped" : "";
            noneButton.textContent = selectedCosmetic === "None" ? "No cosmetic equipped" : "Wear No Cosmetic";
            noneButton.addEventListener("click", () => {
                progress.selectedCosmetic = "None";
                selectedCosmetic = "None";
                saveProgress();
                renderShop();
                updateHud();
                updateStartSummary();
            });
            shopButtons.appendChild(noneButton);
        }

        function updateHud() {
            if (!progress) progress = readProgress();
            playerDisplay.innerText = selectedCharacter;
            ticketDisplay.innerText = progress.totalTickets || 0;
            bestDisplay.innerText = window.ArcadeStorage.getHighScore("mini-world");
            cosmeticDisplay.innerText = selectedCosmetic || "None";
            const found = bones.filter(bone => bone.collected).length;
            if (bonesReturned) questDisplay.innerText = "Complete!";
            else if (found === 3) questDisplay.innerText = "Return to Biscuit";
            else questDisplay.innerText = `Bones ${found}/3`;
            if (theoSelectButton && greySelectButton) {
                theoSelectButton.classList.toggle("selected", selectedCharacter === "Theo");
                greySelectButton.classList.toggle("selected", selectedCharacter === "Grey");
            }
        }

        function updateStartSummary() {
            if (!startSummary || !progress) return;
            const unlockCount = progress.unlockedCosmetics.length;
            startSummary.textContent = `Saved tickets: ${progress.totalTickets || 0} | Best tickets: ${window.ArcadeStorage.getHighScore("mini-world")}\nStyle: ${selectedCosmetic || "None"} | Unlocked styles: ${unlockCount}/3`;
        }

        function updateEffects(dt) {
            for (let i = effects.length - 1; i >= 0; i--) {
                const effect = effects[i];
                effect.life -= dt;
                if (effect.type === "text") effect.y -= 0.45 * dt;
                if (effect.type === "sparkle") {
                    effect.x += effect.vx * dt;
                    effect.y += effect.vy * dt;
                    effect.vy += 0.01 * dt;
                }
                if (effect.type === "ring") {
                    effect.radius += 0.7 * dt;
                }
                if (effect.life <= 0) effects.splice(i, 1);
            }
        }

        function showToast(message) {
            toastMessage.textContent = message;
            toastMessage.classList.add("visible");
            toastTimer = 120;
        }

        function updateToast(dt) {
            if (toastTimer <= 0) return;
            toastTimer -= dt;
            if (toastTimer <= 0) toastMessage.classList.remove("visible");
        }

        function addTextEffect(x, y, color, text) {
            effects.push({ type: "text", x, y, color, text, life: 58 });
        }

        function addSparkleBurst(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.PI * 2 * i / count;
                const speed = randomRange(0.7, 1.8);
                effects.push({
                    type: "sparkle",
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: randomRange(2, 4),
                    color,
                    life: randomRange(28, 44)
                });
            }
        }

        function addQuestCelebration() {
            const x = zones.biscuit.x + 68;
            const y = zones.biscuit.y + 52;
            effects.push({ type: "ring", x, y, radius: 18, color: "#fde68a", life: 70 });
            addSparkleBurst(x, y, "#fde68a", 22);
            addSparkleBurst(player.x, player.y, "#f9a8d4", 16);
        }

        function restartGame() {
            startGame();
        }

        function randomRange(min, max) {
            return min + Math.random() * (max - min);
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function getDist(x1, y1, x2, y2) {
            return Math.hypot(x2 - x1, y2 - y1);
        }

        function pointInRect(x, y, rect) {
            return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
        }

        function hitsWall(x, y, radius) {
            return walls.some(rect => circleRectCollide(x, y, radius, rect));
        }

        function circleRectCollide(x, y, radius, rect) {
            const nearestX = clamp(x, rect.x, rect.x + rect.w);
            const nearestY = clamp(y, rect.y, rect.y + rect.h);
            return getDist(x, y, nearestX, nearestY) < radius;
        }

        function draw() {
            drawMap();
            drawCoins();
            drawBones();
            drawBiscuit();
            drawPlayer();
            drawEffects();
        }

        function drawMap() {
            const grass = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grass.addColorStop(0, "#8ee681");
            grass.addColorStop(1, "#4fbf68");
            ctx.fillStyle = grass;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawSparkles();
            drawZone(zones.playground, "#60a5fa", "PLAYGROUND");
            drawZone(zones.shop, "#fbbf24", "TINY SHOP");
            drawZone(zones.biscuit, "#f97316", "BISCUIT");
            drawObbyPath();
            drawCoinPath();
            drawWalls();
            drawDecorations();
            drawAreaSigns();
            drawQuestBoard();
            drawCosmeticPreview();
        }

        function drawZone(zone, color, label) {
            ctx.save();
            ctx.fillStyle = color + "33";
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            roundedRect(zone.x, zone.y, zone.w, zone.h, 14, true, true);
            ctx.fillStyle = "#0f172a";
            ctx.font = "bold 13px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText(label, zone.x + zone.w / 2, zone.y + 22);
            ctx.restore();
        }

        function drawObbyPath() {
            ctx.save();
            ctx.fillStyle = "rgba(219, 234, 254, 0.55)";
            for (let i = 0; i < 5; i++) {
                roundedRect(zones.obby.x + i * 42, zones.obby.y + (i % 2) * 14, 30, 22, 6, true, false);
            }
            ctx.restore();
        }

        function drawCoinPath() {
            ctx.save();
            ctx.strokeStyle = "rgba(254, 243, 199, 0.45)";
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(110, 250);
            ctx.bezierCurveTo(270, 180, 470, 250, 642, 164);
            ctx.bezierCurveTo(796, 160, 752, 328, 560, 350);
            ctx.bezierCurveTo(440, 370, 540, 492, 724, 456);
            ctx.stroke();
            ctx.restore();
        }

        function drawWalls() {
            walls.forEach((wall, index) => {
                if (index < 4) drawBush(wall);
                else drawToyBlocks(wall);
            });
        }

        function drawDecorations() {
            drawCozyDecorations();
            drawDoghouse(86, 414);
            drawShopStand(704, 102);
            drawSlide(338, 120);
            drawFlowers();
            ctx.fillStyle = "#fef3c7";
            ctx.font = "bold 13px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText("Collect tickets, find bones, and visit the shop!", canvas.width / 2, 28);
        }

        function drawCozyDecorations() {
            cozyDecorations.forEach(item => {
                if (item.type === "tree") drawTree(item.x, item.y);
                if (item.type === "bench") drawBench(item.x, item.y);
                if (item.type === "pinwheel") drawPinwheel(item.x, item.y);
                if (item.type === "lantern") drawYardLantern(item.x, item.y);
            });
            drawSandbox(214, 134);
            drawTicketArch(620, 176);
        }

        function drawAreaSigns() {
            drawSign(706, 56, "Shop", "Styles");
            drawSign(108, 354, "Biscuit Quest", "3 Bones");
            drawSign(362, 62, "Playground", "Hop + Slide");
            drawSign(620, 206, "Coin Trail", "Follow gold");
        }

        function drawSign(x, y, title, subtitle) {
            ctx.save();
            ctx.fillStyle = "#7c2d12";
            ctx.fillRect(x - 4, y + 22, 8, 25);
            ctx.fillStyle = "#fef3c7";
            ctx.strokeStyle = "#92400e";
            ctx.lineWidth = 2;
            roundedRect(x - 48, y, 96, 32, 7, true, true);
            ctx.fillStyle = "#0f172a";
            ctx.font = "bold 11px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText(title, x, y + 13);
            ctx.font = "10px Segoe UI";
            ctx.fillText(subtitle, x, y + 26);
            ctx.restore();
        }

        function drawQuestBoard() {
            const found = bones.filter(bone => bone.collected).length;
            ctx.save();
            ctx.fillStyle = bonesReturned ? "rgba(253, 230, 138, 0.45)" : "rgba(15, 23, 42, 0.38)";
            ctx.strokeStyle = bonesReturned ? "#fde68a" : "#f97316";
            ctx.lineWidth = 2;
            roundedRect(34, 482, 156, 42, 10, true, true);
            ctx.fillStyle = "#f8fafc";
            ctx.font = "bold 12px Segoe UI";
            ctx.textAlign = "left";
            ctx.fillText(bonesReturned ? "Quest Complete!" : "Biscuit Bones", 48, 499);
            for (let i = 0; i < 3; i++) {
                ctx.globalAlpha = i < found ? 1 : 0.35;
                drawBone(62 + i * 32, 514);
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawCosmeticPreview() {
            if (!progress || !progress.unlockedCosmetics.length) return;
            ctx.save();
            ctx.fillStyle = "rgba(15, 23, 42, 0.34)";
            ctx.strokeStyle = "#fde68a";
            ctx.lineWidth = 2;
            roundedRect(650, 152, 132, 54, 10, true, true);
            ctx.fillStyle = "#fef3c7";
            ctx.font = "bold 11px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText("Style Preview", 716, 168);
            if (progress.unlockedCosmetics.includes("redHat")) drawMiniHat(684, 188);
            if (progress.unlockedCosmetics.includes("blueTrail")) drawMiniTrail(716, 188);
            if (progress.unlockedCosmetics.includes("lanternGlow")) drawMiniGlow(750, 188);
            ctx.restore();
        }

        function drawSparkles() {
            sparkleDots.forEach(dot => {
                dot.twinkle += 0.02;
                ctx.globalAlpha = 0.22 + Math.sin(dot.twinkle) * 0.12;
                ctx.fillStyle = "#fef3c7";
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;
                coin.bob += 0.04;
                const y = coin.y + Math.sin(coin.bob) * 2;
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#fde68a";
                ctx.fillStyle = "#facc15";
                ctx.beginPath();
                ctx.arc(coin.x, y, coin.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#fff7ad";
                ctx.beginPath();
                ctx.arc(coin.x - 3, y - 3, coin.radius * 0.28, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawBones() {
            bones.forEach(bone => {
                if (bone.collected) return;
                bone.bob += 0.04;
                const y = bone.y + Math.sin(bone.bob) * 2;
                ctx.save();
                ctx.globalAlpha = 0.35 + Math.sin(bone.bob * 2) * 0.15;
                ctx.fillStyle = "#fef3c7";
                ctx.beginPath();
                ctx.arc(bone.x, y, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                drawBone(bone.x, y);
            });
        }

        function drawBiscuit() {
            const x = zones.biscuit.x + 68;
            const y = zones.biscuit.y + 52;
            ctx.save();
            ctx.fillStyle = bonesReturned ? "rgba(254, 243, 199, 0.32)" : "rgba(251, 191, 36, 0.16)";
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#f59e0b";
            ctx.beginPath();
            ctx.ellipse(x, y + 6, 21, 14, 0, 0, Math.PI * 2);
            ctx.arc(x - 12, y - 8, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#92400e";
            ctx.beginPath();
            ctx.ellipse(x - 20, y - 8, 5, 9, -0.45, 0, Math.PI * 2);
            ctx.ellipse(x - 5, y - 10, 5, 9, 0.45, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#fbbf24";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(x + 20, y + 1, 10, -1.1, 0.8);
            ctx.stroke();
            ctx.fillStyle = "#0f172a";
            ctx.beginPath();
            ctx.arc(x - 15, y - 9, 1.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawPlayer() {
            if (!player) return;
            const isGrey = player.name === "Grey";
            ctx.save();
            if (selectedCosmetic === "Blue Trail") {
                ctx.fillStyle = "rgba(96, 165, 250, 0.32)";
                ctx.beginPath();
                ctx.arc(player.x - 13, player.y + 12, 13, 0, Math.PI * 2);
                ctx.fill();
            }
            if (selectedCosmetic === "Lantern Glow") {
                ctx.fillStyle = "rgba(253, 230, 138, 0.22)";
                ctx.beginPath();
                ctx.arc(player.x, player.y, 34, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 12;
            ctx.shadowColor = isGrey ? "#a78bfa" : "#38bdf8";
            ctx.fillStyle = isGrey ? "#a78bfa" : "#38bdf8";
            ctx.beginPath();
            ctx.arc(player.x, player.y + 5, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = isGrey ? "#ede9fe" : "#fde68a";
            ctx.beginPath();
            ctx.arc(player.x, player.y - 9, 13, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#0f172a";
            ctx.beginPath();
            ctx.arc(player.x - 4, player.y - 11, 1.7, 0, Math.PI * 2);
            ctx.arc(player.x + 4, player.y - 11, 1.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#0f172a";
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.arc(player.x, player.y - 7, 4.5, 0.2, Math.PI - 0.2);
            ctx.stroke();
            if (selectedCosmetic === "Red Hat") {
                ctx.fillStyle = "#ef4444";
                roundedRect(player.x - 12, player.y - 23, 24, 8, 4, true, false);
                ctx.fillRect(player.x + 5, player.y - 19, 14, 3);
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#f8fafc";
            ctx.font = "bold 12px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText(player.name, player.x, player.y - 28);
            ctx.restore();
        }

        function drawEffects() {
            effects.forEach(effect => {
                ctx.globalAlpha = Math.min(1, Math.max(0, effect.life / 54));
                ctx.fillStyle = effect.color;
                if (effect.type === "sparkle") {
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, effect.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (effect.type === "ring") {
                    ctx.strokeStyle = effect.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, effect.radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.font = "bold 16px Segoe UI";
                    ctx.textAlign = "center";
                    ctx.fillText(effect.text, effect.x, effect.y);
                }
            });
            ctx.globalAlpha = 1;
        }

        function drawBush(rect) {
            ctx.save();
            ctx.fillStyle = "#166534";
            ctx.shadowBlur = 6;
            ctx.shadowColor = "rgba(22, 101, 52, 0.55)";
            ctx.beginPath();
            ctx.arc(rect.x + rect.w * 0.2, rect.y + rect.h * 0.6, rect.h * 0.42, 0, Math.PI * 2);
            ctx.arc(rect.x + rect.w * 0.5, rect.y + rect.h * 0.42, rect.h * 0.52, 0, Math.PI * 2);
            ctx.arc(rect.x + rect.w * 0.78, rect.y + rect.h * 0.62, rect.h * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#22c55e";
            ctx.beginPath();
            ctx.arc(rect.x + rect.w * 0.48, rect.y + rect.h * 0.36, 5, 0, Math.PI * 2);
            ctx.arc(rect.x + rect.w * 0.68, rect.y + rect.h * 0.6, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawToyBlocks(rect) {
            ctx.save();
            const size = Math.min(38, rect.w);
            const blocks = [
                { x: rect.x, y: rect.y + 8, color: "#f97316", letter: "A" },
                { x: rect.x + 34, y: rect.y, color: "#60a5fa", letter: "B" },
                { x: rect.x + 16, y: rect.y + 38, color: "#f9a8d4", letter: "C" }
            ];
            blocks.forEach(block => {
                ctx.fillStyle = block.color;
                roundedRect(block.x, block.y, size, size, 6, true, false);
                ctx.fillStyle = "#0f172a";
                ctx.font = "bold 13px Segoe UI";
                ctx.textAlign = "center";
                ctx.fillText(block.letter, block.x + size / 2, block.y + size * 0.65);
            });
            ctx.restore();
        }

        function drawBone(x, y) {
            ctx.save();
            ctx.fillStyle = "#f8fafc";
            ctx.strokeStyle = "#cbd5e1";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(x - 8, y - 4, 5, 0, Math.PI * 2);
            ctx.arc(x - 8, y + 4, 5, 0, Math.PI * 2);
            ctx.arc(x + 8, y - 4, 5, 0, Math.PI * 2);
            ctx.arc(x + 8, y + 4, 5, 0, Math.PI * 2);
            ctx.fillRect(x - 9, y - 4, 18, 8);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function drawDoghouse(x, y) {
            ctx.save();
            ctx.fillStyle = "#b45309";
            roundedRect(x - 34, y, 68, 46, 8, true, false);
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.moveTo(x - 42, y + 6);
            ctx.lineTo(x, y - 30);
            ctx.lineTo(x + 42, y + 6);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#0f172a";
            ctx.beginPath();
            ctx.arc(x, y + 28, 15, Math.PI, 0);
            ctx.lineTo(x + 15, y + 46);
            ctx.lineTo(x - 15, y + 46);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawShopStand(x, y) {
            ctx.save();
            ctx.fillStyle = "#92400e";
            roundedRect(x - 42, y + 10, 84, 44, 8, true, false);
            ctx.fillStyle = "#fde68a";
            roundedRect(x - 52, y - 12, 104, 28, 8, true, false);
            ctx.fillStyle = "#0f172a";
            ctx.font = "bold 13px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText("SHOP", x, y + 7);
            ctx.restore();
        }

        function drawSlide(x, y) {
            ctx.save();
            ctx.fillStyle = "#2563eb";
            roundedRect(x - 48, y + 24, 96, 18, 8, true, false);
            ctx.strokeStyle = "#f97316";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(x - 34, y + 24);
            ctx.lineTo(x - 8, y - 20);
            ctx.lineTo(x + 28, y + 24);
            ctx.stroke();
            ctx.restore();
        }

        function drawFlowers() {
            [[52, 72], [72, 98], [770, 294], [736, 324], [92, 514], [474, 72], [456, 92]].forEach((flower, index) => {
                ctx.save();
                ctx.fillStyle = index % 2 ? "#f9a8d4" : "#fde047";
                ctx.beginPath();
                ctx.arc(flower[0], flower[1], 5, 0, Math.PI * 2);
                ctx.arc(flower[0] + 6, flower[1], 4, 0, Math.PI * 2);
                ctx.arc(flower[0] - 6, flower[1], 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawTree(x, y) {
            ctx.save();
            ctx.fillStyle = "#7c2d12";
            ctx.fillRect(x - 5, y + 12, 10, 24);
            ctx.fillStyle = "#15803d";
            ctx.beginPath();
            ctx.arc(x, y + 8, 24, 0, Math.PI * 2);
            ctx.arc(x - 16, y + 18, 18, 0, Math.PI * 2);
            ctx.arc(x + 16, y + 18, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#22c55e";
            ctx.beginPath();
            ctx.arc(x + 8, y + 2, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawBench(x, y) {
            ctx.save();
            ctx.fillStyle = "#92400e";
            roundedRect(x - 34, y, 68, 10, 4, true, false);
            roundedRect(x - 30, y + 16, 60, 10, 4, true, false);
            ctx.strokeStyle = "#451a03";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x - 24, y + 26);
            ctx.lineTo(x - 30, y + 40);
            ctx.moveTo(x + 24, y + 26);
            ctx.lineTo(x + 30, y + 40);
            ctx.stroke();
            ctx.restore();
        }

        function drawPinwheel(x, y) {
            ctx.save();
            ctx.strokeStyle = "#f8fafc";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x, y + 8);
            ctx.lineTo(x, y + 38);
            ctx.stroke();
            const blades = ["#f97316", "#60a5fa", "#f9a8d4", "#fde047"];
            blades.forEach((color, index) => {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(x, y);
                const angle = index * Math.PI / 2;
                ctx.lineTo(x + Math.cos(angle - 0.35) * 18, y + Math.sin(angle - 0.35) * 18);
                ctx.lineTo(x + Math.cos(angle + 0.35) * 18, y + Math.sin(angle + 0.35) * 18);
                ctx.closePath();
                ctx.fill();
            });
            ctx.fillStyle = "#f8fafc";
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawYardLantern(x, y) {
            ctx.save();
            ctx.fillStyle = "#7c2d12";
            ctx.fillRect(x - 3, y, 6, 28);
            ctx.fillStyle = "rgba(253, 230, 138, 0.22)";
            ctx.beginPath();
            ctx.arc(x, y - 4, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fde68a";
            roundedRect(x - 8, y - 14, 16, 18, 5, true, false);
            ctx.strokeStyle = "#92400e";
            ctx.lineWidth = 2;
            ctx.strokeRect(x - 8, y - 14, 16, 18);
            ctx.restore();
        }

        function drawSandbox(x, y) {
            ctx.save();
            ctx.fillStyle = "#d97706";
            roundedRect(x - 48, y - 24, 96, 48, 10, true, false);
            ctx.fillStyle = "#fde68a";
            roundedRect(x - 38, y - 16, 76, 32, 10, true, false);
            ctx.fillStyle = "#60a5fa";
            ctx.beginPath();
            ctx.arc(x + 18, y - 2, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawTicketArch(x, y) {
            ctx.save();
            ctx.strokeStyle = "#fde68a";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(x, y, 34, Math.PI, 0);
            ctx.stroke();
            ctx.fillStyle = "#facc15";
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(x - 30 + i * 15, y - 28 + Math.abs(i - 2) * 3, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawMiniHat(x, y) {
            ctx.fillStyle = "#ef4444";
            roundedRect(x - 10, y - 8, 20, 9, 4, true, false);
            ctx.fillRect(x + 4, y, 12, 3);
        }

        function drawMiniTrail(x, y) {
            ctx.fillStyle = "rgba(96, 165, 250, 0.7)";
            ctx.beginPath();
            ctx.arc(x - 6, y, 7, 0, Math.PI * 2);
            ctx.arc(x + 6, y, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMiniGlow(x, y) {
            ctx.fillStyle = "rgba(253, 230, 138, 0.65)";
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fef3c7";
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function roundedRect(x, y, w, h, radius, fill, stroke) {
            const r = Math.min(radius, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            if (fill) ctx.fill();
            if (stroke) ctx.stroke();
        }

        window.ArcadeControls.init({
            instructions: [
                "Choose Theo or Grey.",
                "Move with WASD, arrow keys, or the tablet D-pad.",
                "Collect shiny coins and tickets around the mini world.",
                "Find 3 bones, then return to Biscuit at the doghouse.",
                "Walk into the Tiny Shop to unlock cozy cosmetics.",
                "There are no enemies and no losing. Just explore and play."
            ],
            onRestart: restartGame,
            isPaused: () => isPaused,
            onPauseToggle: () => {
                if (!gameStarted || shopScreen.style.display === "block") return false;
                isPaused = !isPaused;
                if (!isPaused) lastTime = performance.now();
                return isPaused;
            }
        });

        window.ArcadeMobileControls.createDPad({
            shouldHide: () => !gameStarted || isPaused || startScreen.style.display === "block" || shopScreen.style.display === "block"
        });

        progress = readProgress();
        selectedCharacter = progress.selectedCharacter || "Theo";
        selectedCosmetic = progress.selectedCosmetic || "None";
        startScreen.style.display = "block";
        shopScreen.style.display = "none";
        setupWorld();
        gameStarted = false;
        updateHud();
        draw();
    </script>
</body>
</html>
